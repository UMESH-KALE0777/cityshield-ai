<nav class="topbar">
  <a class="topbar-brand" href="/">
    <div class="logo-icon">🛡</div>
    <span>Urban Safety <span style="color:var(--accent)">AI</span></span>
  </a>
  <div class="topbar-search">
    <i class="fas fa-search search-icon"></i>
    <input type="text" placeholder="Search zones, incidents...">
  </div>
  <div class="topbar-actions">
    <div class="topbar-btn topbar-badge" title="Alerts"><i class="fas fa-bell"></i></div>
    <div class="topbar-btn" title="Settings"><i class="fas fa-cog"></i></div>
    <div class="user-pill">
      <div class="user-avatar">U</div>
      <span class="user-name">{% if user.is_authenticated %}{{ user.username }}{% else %}Guest{% endif %}</span>
      <i class="fas fa-chevron-down" style="font-size:.65rem;color:var(--text-muted);"></i>
    </div>
    {% if user.is_authenticated %}
    <a href="/accounts/logout/" class="btn btn-ghost" style="padding:6px 12px;font-size:.8rem;">Logout</a>
    {% endif %}
  </div>
</nav>
