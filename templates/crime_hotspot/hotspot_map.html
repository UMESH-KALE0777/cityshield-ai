{% extends 'base.html' %}
{% block content %}
<style>
  .hs-wrap   { display: flex; height: calc(100vh - 64px); gap: 0; }
  .hs-side   { width: 220px; flex-shrink: 0; background: #12121f;
               border-right: 1px solid #1e1e3a; padding: 16px; overflow-y: auto; }
  .hs-map    { flex: 1; }
  .hs-map iframe, .hs-map > div { width: 100% !important; height: 100% !important; }
  .hs-total-label { font-size: 11px; color: #64748b; text-transform: uppercase;
                    letter-spacing: .06em; margin-bottom: 4px; }
  .hs-total-num   { font-size: 36px; font-weight: 700; color: #f87171; margin-bottom: 16px; }
  .hs-section     { font-size: 11px; color: #64748b; text-transform: uppercase;
                    letter-spacing: .06em; margin-bottom: 10px; margin-top: 4px; }
  .hs-row    { margin-bottom: 10px; }
  .hs-row-top { display: flex; justify-content: space-between; font-size: 13px;
                color: #cbd5e1; margin-bottom: 3px; }
  .hs-bar-bg { background: #1e1e3a; border-radius: 999px; height: 4px; }
  .hs-bar    { background: #f87171; height: 4px; border-radius: 999px; }
  .hs-report { display: block; margin-top: 20px; text-align: center;
               background: #ef4444; color: #fff; padding: 10px;
               border-radius: 8px; font-size: 13px; font-weight: 500;
               text-decoration: none; }
  .hs-report:hover { background: #dc2626; }
</style>

<div class="hs-wrap">
  <div class="hs-side">
    <p class="hs-total-label">Total incidents</p>
    <p class="hs-total-num">{{ total_crimes|floatformat:"0" }}</p>

    <p class="hs-section">By crime type</p>
    {% for item in type_counts %}
    <div class="hs-row">
      <div class="hs-row-top">
        <span>{{ item.crime_type }}</span>
        <span>{{ item.count }}</span>
      </div>
      <div class="hs-bar-bg">
        <div class="hs-bar"
             style="width: {% widthratio item.count total_crimes 100 %}%"></div>
      </div>
    </div>
    {% empty %}
    <p style="font-size:12px;color:#475569">No data loaded yet.</p>
    {% endfor %}

    <a class="hs-report" href="{% url 'report_crime' %}">+ Report a Crime</a>
  </div>

  <div class="hs-map">
    {{ map|safe }}
  </div>
</div>
{% endblock %}
